# Sample rubric template — adjust per assignment
assignment_id: "assignment_x"
scoring_mode: "equal_weights"
partial_credit: 0.5
bands:
  check_plus_min: 0.95
  check_min: 0.85
questions:
  - id: "a"
    label_patterns: ["a)", "a.", "(a)"]
    anchor_tokens: ["a)", "a.", "(a)"]
    scoring_rules: >
      Describe what a fully correct answer includes. For numerical answers,
      specify the expected value and an acceptable tolerance (e.g. accept ±0.01).
      For cascading calculations, note that rounding_error should be used when
      the method is correct but a carried-forward error from a prior question
      causes a minor difference. Partial credit cases: describe what earns 0.5.
    short_note_pass: "Correct."
    short_note_fail: "Needs revision."
    weight: 1.0
  - id: "b"
    label_patterns: ["b)", "b.", "(b)"]
    anchor_tokens: ["b)", "b.", "(b)"]
    scoring_rules: >
      Describe what a fully correct answer includes. For numerical answers,
      specify the expected value and an acceptable tolerance (e.g. accept ±0.01).
      For cascading calculations, note that rounding_error should be used when
      the method is correct but a carried-forward error from a prior question
      causes a minor difference. Partial credit cases: describe what earns 0.5.
    short_note_pass: "Correct."
    short_note_fail: "Needs revision."
    weight: 1.0
