# Copy this file to .manual_runs/profiles/<name>.toml and replace placeholders.

[grade]
# Required fields
submissions_dir = "/path/to/brightspace/submissions"
solutions_pdf = "/path/to/assignment_solutions.pdf"
rubric_yaml = "/path/to/sda-grader/configs/assignment2.yaml"
grades_template_csv = "/path/to/brightspace_grade_template.csv"
grade_column = "Assignment 2 Points Grade"
output_dir = "/path/to/grading/output/assignment2"

# Optional fields (defaults shown)
grading_mode = "unified" # choices: legacy, unified, agent
model = "gemini-2.5-flash"
identifier_column = "OrgDefinedId"
context_cache = true
context_cache_ttl_seconds = 86400
plain = false

# Optional: pass through any supported grader CLI fields
# temp_dir = "/path/to/sda-grader/.grader_tmp/a2"
# cache_dir = "/path/to/sda-grader/.grader_cache/a2"
# locator_model = ""
# api_key_env = "GEMINI_API_KEY"
# comment_column = ""
# ocr_char_threshold = 200
# student_filter = ""
# dry_run = false
# annotate_dry_run_marks = false
# check_plus_points = "100"
# check_points = "85"
# check_minus_points = "65"
# review_required_points = ""
# diagnostics_file = "/path/to/custom/grading_diagnostics.json"

[review]
# Optional review server defaults
host = "127.0.0.1"
port = 8765
